name: PreStocks CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend Tests ───
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: prestocks_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: ci-test-secret
          JWT_REFRESH_SECRET_KEY: ci-refresh-secret
        run: pytest tests/test_unit.py -v --tb=short

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/prestocks_test
          JWT_SECRET_KEY: ci-test-secret
          JWT_REFRESH_SECRET_KEY: ci-refresh-secret
          REDIS_URL: redis://localhost:6379
        run: pytest tests/test_integration.py -v --tb=short

      - name: Run E2E tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/prestocks_test
          JWT_SECRET_KEY: ci-test-secret
          JWT_REFRESH_SECRET_KEY: ci-refresh-secret
        run: pytest tests/test_e2e.py -v --tb=short

      - name: Run full test suite with coverage
        working-directory: backend
        env:
          DATABASE_URL: sqlite:///./test.db
          JWT_SECRET_KEY: ci-test-secret
          JWT_REFRESH_SECRET_KEY: ci-refresh-secret
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: backend/coverage.xml

  # ─── Frontend Tests ───
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: HTML Validation
        run: |
          pip install html5validator
          html5validator --root . --match "*.html" --ignore "node_modules" || true

      - name: CSS Linting
        run: |
          npx stylelint "css/**/*.css" --config '{"extends":"stylelint-config-standard"}' || true

      - name: Accessibility audit (axe)
        run: |
          npx @axe-core/cli landing.html --exit || true

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --collect.staticDistDir=. --assert.preset=lighthouse:recommended || true

  # ─── Security Scan ───
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit (Python security)
        working-directory: backend
        run: |
          pip install bandit
          bandit -r app/ -ll || true

      - name: Check for secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files || true

  # ─── Deploy (on main push) ───
  deploy:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: "backend/**,tests/**,node_modules/**"
