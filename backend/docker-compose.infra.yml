version: "3.9"

x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://prestocks:prestocks@postgres:5432/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://prestocks:prestocks@postgres:5432/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/1
    AIRFLOW__WEBSERVER__SECRET_KEY: prestocks-airflow-local-secret
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
    POSTGRES_URL: postgresql+psycopg2://prestocks:prestocks@postgres:5432/prestocks
    REDIS_URL: redis://redis:6379/0
    APP_ENV: development
    PYTHONPATH: /opt/prestocks
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./:/opt/prestocks/backend
  depends_on:
    - postgres
    - redis

services:
  postgres:
    image: postgres:16
    container_name: prestocks-postgres
    environment:
      POSTGRES_USER: prestocks
      POSTGRES_PASSWORD: prestocks
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - prestocks_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: prestocks-redis
    ports:
      - "6379:6379"

  airflow-init:
    <<: *airflow-common
    container_name: prestocks-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --firstname Pre \
          --lastname Stocks \
          --role Admin \
          --email admin@prestocks.local \
          --password admin
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: prestocks-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: prestocks-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  prestocks_pg_data:

